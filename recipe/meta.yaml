{% set version = "1.5.4" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-sits
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/sits_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/sits/sits_{{ version }}.tar.gz
  sha256: e7d0f6b711a97cc9234746a519bb909a4d62f07aa94994f9d1b78613de084b33

build:
  skip: true  # [win]
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib("c") }}            # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib("m2w64_c") }}      # [win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - libblas
    - liblapack
    - _openmp_mutex                # [linux]
    - llvm-openmp                  # [osx]
    - r-base
    - r-rcpp >=1.1.0
    - r-rcpparmadillo
    - r-dplyr >=1.1.0
    - r-httr2 >=1.1.0
    - r-leafgl
    - r-leaflet >=2.2.2
    - r-lubridate
    - r-luz >=0.4.0
    - r-purrr >=1.0.2
    - r-randomforest
    - r-rstac >=1.0.1
    - r-sf >=1.0_19
    - r-slider >=0.2.0
    - r-terra >=1.8_54
    - r-tibble >=3.3.0
    - r-tidyr >=1.3.0
    - r-tmap >=4.1
    - r-torch >=0.15.0
    - r-units
    - r-yaml >=2.3.0
  run:
    - r-base
    - r-rcpp >=1.1.0
    - r-rcpparmadillo
    - r-dplyr >=1.1.0
    - r-httr2 >=1.1.0
    - r-leafgl
    - r-leaflet >=2.2.2
    - r-lubridate
    - r-luz >=0.4.0
    - r-purrr >=1.0.2
    - r-randomforest
    - r-rstac >=1.0.1
    - r-sf >=1.0_19
    - r-slider >=0.2.0
    - r-terra >=1.8_54
    - r-tibble >=3.3.0
    - r-tidyr >=1.3.0
    - r-tmap >=4.1
    - r-torch >=0.15.0
    - r-units
    - r-yaml >=2.3.0

test:
  commands:
    - $R -e "library('sits')"           # [not win]
    - "\"%R%\" -e \"library('sits')\""  # [win]

about:
  home: https://github.com/e-sensing/sits
  license: GPL-2.0-only
  summary: |
    The sits R package provides a set of tools for analysis, visualization and classification of satellite image time series. The main aim of SITS is to support land cover and land change classification of image data cubes using machine learning methods. The basic workflow in SITS is:

    1. Create a data cube using image collections available in the cloud or in local machines.
    2. Extract time series from the data cube which are used as training data.
    3. Perform quality control and filtering on the samples.
    4. Train a machine learning model using the extracted samples.
    5. Classify the data cube using the trained model.
    6. Post-process the classified images.
    7. Evaluate the accuracy of the classification using best practices.

  license_family: GPL2
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2

extra:
  recipe-maintainers:
    - conda-forge/r
    - TomAugspurger
